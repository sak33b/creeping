<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Behind the Paper</title>
    <link rel="stylesheet" href="./src/styles/tailwind.css" />
    <link rel="stylesheet" href="./src/styles/stage-4.css" />
  </head>
  <body class="stage-4 w-screen h-screen relative flex flex-col font-display text-bruised-green group/root animate-tremor">
    <div class="absolute inset-[-50%] z-0 chaos-bg animate-aggressive-bg origin-center">
      <div class="absolute inset-0 pattern-overlay mix-blend-multiply"></div>
    </div>
    <div class="ink-stain w-96 h-96 top-[-10%] left-[-10%]"></div>
    <div class="ink-stain w-[500px] h-[500px] bottom-10 right-[-20%]"></div>
    <div class="ink-stain w-64 h-64 top-1/2 left-1/3"></div>
    <div class="absolute inset-0 z-5 pointer-events-none overflow-hidden opacity-30 animate-chromatic">
      <p class="absolute top-[10%] left-[5%] text-[10rem] font-bold whitespace-nowrap transform rotate-[-20deg]">
        I MUST GET OUT
      </p>
      <p class="absolute top-[40%] right-[-10%] text-[8rem] font-madness whitespace-nowrap transform rotate-[15deg]">
        THE PATTERN MOVES
      </p>
      <p class="absolute bottom-[20%] left-[-20%] text-[12rem] font-distressed whitespace-nowrap transform rotate-[-5deg]">
        SHE IS BEHIND IT
      </p>
      <p class="absolute top-[70%] left-[30%] text-[6rem] font-bold whitespace-nowrap transform rotate-[180deg]">
        I MUST GET OUT
      </p>
    </div>
    <div class="absolute inset-0 z-10 pointer-events-none overflow-hidden">
      <p
        class="absolute top-[15%] left-[20%] text-9xl font-bloody animate-tremor text-red-900 opacity-90"
        style="transform: rotate(-35deg);"
      >
        STRANGLE
      </p>
      <p
        class="absolute top-1/2 right-[10%] text-7xl font-madness animate-chromatic text-black"
        style="transform: rotate(85deg);"
      >
        It creeps
      </p>
      <p
        class="absolute top-[5%] left-[60%] text-[15rem] font-extrabold font-distressed animate-tremor opacity-70"
        style="transform: rotate(110deg);"
      >
        THE SMELL
      </p>
      <p
        class="absolute bottom-[10%] left-[10%] text-4xl font-display font-black animate-chromatic"
        style="transform: rotate(-75deg);"
      >
        I must get her out
      </p>
      <p
        class="absolute top-[30%] left-[40%] text-5xl font-madness animate-tremor opacity-80"
        style="transform: rotate(210deg);"
      >
        Yellow. All yellow.
      </p>
      <p
        class="absolute bottom-[30%] right-[30%] text-8xl font-distressed animate-chromatic text-bruised-green"
        style="transform: rotate(-15deg);"
      >
        She is behind it
      </p>
      <p
        class="absolute top-[80%] left-[50%] text-6xl font-bloody animate-tremor text-red-800"
        style="transform: rotate(45deg);"
      >
        Pattern moves
      </p>
    </div>
    <div class="absolute inset-0 z-20 pointer-events-auto">
      <button
        class="madness-btn absolute top-[10%] left-[10%] w-48 h-20 bg-primary text-background-light font-distressed text-3xl rounded-none border-4 border-black animate-chromatic-box hover:scale-125 transition-transform"
        data-action="blackout"
        type="button"
        style="transform: rotate(-25deg);"
      >
        PEEL IT OFF
      </button>
      <button
        class="madness-btn absolute top-[40%] left-[5%] w-64 h-32 bg-primary text-background-light font-bold text-5xl rounded-none border-4 border-black animate-chromatic-box hover:scale-125 transition-transform"
        data-action="blackout"
        type="button"
        style="transform: rotate(15deg);"
      >
        PEEL IT OFF
      </button>
      <button
        class="madness-btn absolute top-[70%] left-[15%] w-32 h-16 bg-primary text-background-light font-madness text-xl rounded-none border-2 border-black animate-chromatic-box hover:scale-125 transition-transform"
        data-action="blackout"
        type="button"
        style="transform: rotate(-65deg);"
      >
        PEEL IT OFF
      </button>
      <button
        class="madness-btn absolute top-[20%] left-[40%] w-80 h-40 bg-primary text-background-light font-bloody text-6xl rounded-none border-8 border-black animate-chromatic-box hover:scale-125 transition-transform"
        data-action="blackout"
        type="button"
        style="transform: rotate(10deg);"
      >
        PEEL IT OFF
      </button>
      <button
        class="madness-btn absolute top-[60%] left-[35%] w-40 h-24 bg-primary text-background-light font-display font-black text-2xl rounded-none border-4 border-black animate-chromatic-box hover:scale-125 transition-transform"
        data-action="blackout"
        type="button"
        style="transform: rotate(-110deg);"
      >
        PEEL IT OFF
      </button>
      <button
        class="madness-btn absolute top-[15%] right-[15%] w-56 h-28 bg-primary text-background-light font-distressed text-4xl rounded-none border-4 border-black animate-chromatic-box hover:scale-125 transition-transform"
        data-action="blackout"
        type="button"
        style="transform: rotate(45deg);"
      >
        PEEL IT OFF
      </button>
      <button
        class="madness-btn absolute top-[50%] right-[5%] w-72 h-36 bg-primary text-background-light font-bold text-5xl rounded-none border-8 border-black animate-chromatic-box hover:scale-125 transition-transform"
        data-action="blackout"
        type="button"
        style="transform: rotate(-30deg);"
      >
        PEEL IT OFF
      </button>
      <button
        class="madness-btn absolute bottom-[10%] right-[20%] w-48 h-24 bg-primary text-background-light font-madness text-3xl rounded-none border-4 border-black animate-chromatic-box hover:scale-125 transition-transform"
        data-action="blackout"
        type="button"
        style="transform: rotate(175deg);"
      >
        PEEL IT OFF
      </button>
      <button
        class="madness-btn absolute top-[5%] right-[45%] w-32 h-12 bg-primary text-background-light font-display text-sm rounded-none border-2 border-black animate-chromatic-box hover:scale-125 transition-transform"
        data-action="blackout"
        type="button"
        style="transform: rotate(-5deg);"
      >
        PEEL IT OFF
      </button>
      <button
        class="madness-btn absolute bottom-[5%] left-[45%] w-[400px] h-[150px] bg-primary text-background-light font-bloody text-7xl rounded-none border-8 border-black animate-chromatic-box hover:scale-125 transition-transform"
        data-action="blackout"
        type="button"
        style="transform: rotate(-8deg);"
      >
        PEEL IT OFF
      </button>
      <button
        class="madness-btn absolute top-[80%] left-[5%] w-24 h-12 bg-primary text-background-light font-distressed text-lg rounded-none border-2 border-black animate-chromatic-box hover:scale-125 transition-transform"
        data-action="blackout"
        type="button"
        style="transform: rotate(55deg);"
      >
        PEEL IT OFF
      </button>
      <button
        class="madness-btn absolute top-[30%] right-[30%] w-60 h-20 bg-primary text-background-light font-bold text-3xl rounded-none border-4 border-black animate-chromatic-box hover:scale-125 transition-transform"
        data-action="blackout"
        type="button"
        style="transform: rotate(-140deg);"
      >
        PEEL IT OFF
      </button>
    </div>
    <script type="module" src="./src/scripts/main.js"></script>
  </body>
</html>
